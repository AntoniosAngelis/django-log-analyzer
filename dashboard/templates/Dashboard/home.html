<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOC Dashboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: white;
            padding: 40px;
        }

        .container {
            max-width: 800px;
            margin: auto;
        }

        h1 {
            color: #38bdf8;
        }

        .card {
            background-color: #1e293b;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        input[type=file] {
            margin-top: 10px;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #38bdf8;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0ea5e9;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #334155;
            text-align: left;
        }

        th {
            color: #38bdf8;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>SOC Security Dashboard</h1>

    <div class="card">
        <h2>Upload Log File</h2>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <input type="file" name="logfile">
            <br>
            <button type="submit">Analyze Logs</button>
        </form>
    </div>

    {% if results %}
    <div class="card">
        <h2>Analysis Results</h2>

        <table>
            <tr>
                <th>IP Address</th>
                <th>Failed Login Attempts</th>
            </tr>

            {% for ip, count in results %}
            <tr>
                <td>{{ ip }}</td>
                <td>{{ count }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>
    {% endif %}

</div>

</body>
</html>
